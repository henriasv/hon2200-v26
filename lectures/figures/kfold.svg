<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <title>K-Fold Cross-Validation</title>
  <desc>Illustration of k-fold cross-validation</desc>

  <rect x="50" y="50" width="500" height="50" fill="#ADD8E6" stroke="black" stroke-width="2"/>
  <text x="300" y="80" text-anchor="middle" dominant-baseline="middle" font-size="16">Dataset</text>

  <g transform="translate(50, 150)">
    <text x="-20" y="25" dominant-baseline="middle" font-size="16">K = 5 (Example)</text>
    <g transform="translate(0,0)">
      <rect x="0" y="0" width="100" height="50" fill="#90EE90" stroke="black" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14">Fold 1 (Test)</text>
    </g>
    <g transform="translate(100,0)">
      <rect x="0" y="0" width="100" height="50" fill="#FFFFE0" stroke="black" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14">Fold 2</text>
    </g>
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="100" height="50" fill="#FFFFE0" stroke="black" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14">Fold 3</text>
    </g>
    <g transform="translate(300,0)">
      <rect x="0" y="0" width="100" height="50" fill="#FFFFE0" stroke="black" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14">Fold 4</text>
    </g>
    <g transform="translate(400,0)">
      <rect x="0" y="0" width="100" height="50" fill="#FFFFE0" stroke="black" stroke-width="2"/>
      <text x="50" y="25" text-anchor="middle" dominant-baseline="middle" font-size="14">Fold 5</text>
    </g>
  </g>

  <path d="M 300 100 L 300 150" stroke="black" stroke-width="2" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="black"/>
    </marker>
  </defs>
</svg>